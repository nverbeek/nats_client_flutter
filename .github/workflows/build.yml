on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
env:
  ARTIFACT_SUFFIX: ${{ github.ref_type == 'tag' && github.ref_name || github.run_id }}
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      # nats:latest is a fully distroless image (no shell, no wget/curl, not
      # even `which`) — a Docker healthcheck has to `exec` a command *inside*
      # the container, which is impossible here, so no `options:` health-cmd
      # is used. Without one, GitHub Actions just waits for the container to
      # start rather than polling for health, which is fine: nats-server
      # starts in well under a second, and the steps below (checkout,
      # Flutter setup, `flutter pub get`, enabling the Linux desktop target)
      # take far longer than that before anything tries to connect to it.
      nats:
        image: nats:latest
        ports:
          - 4222:4222
          - 8222:8222
        command: -js -m 8222
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Linux desktop + Xvfb dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev xvfb
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable linux build
        run: flutter config --enable-linux-desktop
      - name: Run fast widget/unit test suite
        run: flutter test test/
      - name: Start auth fixture servers
        # integration_test/authentication_test.dart needs one server per auth
        # method (NATS's simple user/pass, token, and bare-nkey auth blocks,
        # plus operator/JWT mode, are mutually exclusive server configs, so
        # this can't be folded into the shared `nats` service above). These
        # are started as a regular step — rather than a `services:` entry —
        # because `services:` containers start before `actions/checkout`,
        # too early to mount the config files these depend on. See
        # integration_test/fixtures/auth/ for each fixture and AGENTS.md's
        # auth recipe for how to run them locally.
        run: |
          docker run -d --name nats-fixture-userpass -p 4300:4222 \
            -v "$PWD/integration_test/fixtures/auth/userpass.conf:/etc/nats/nats-server.conf:ro" \
            nats:latest -c /etc/nats/nats-server.conf
          docker run -d --name nats-fixture-token -p 4301:4222 \
            -v "$PWD/integration_test/fixtures/auth/token.conf:/etc/nats/nats-server.conf:ro" \
            nats:latest -c /etc/nats/nats-server.conf
          docker run -d --name nats-fixture-nkey -p 4302:4222 \
            -v "$PWD/integration_test/fixtures/auth/nkey.conf:/etc/nats/nats-server.conf:ro" \
            nats:latest -c /etc/nats/nats-server.conf
          docker run -d --name nats-fixture-creds -p 4303:4222 \
            -v "$PWD/integration_test/fixtures/auth/creds.conf:/etc/nats/nats-server.conf:ro" \
            nats:latest -c /etc/nats/nats-server.conf
      - name: Run real-backend integration test suite
        run: |
          # Run each integration_test file as its own `flutter test` invocation
          # rather than passing the whole directory at once: each file boots a
          # full app process, and running multiple in one invocation against
          # the same desktop target has been observed to fail to relaunch the
          # app for the second file. Looping keeps this working as more
          # integration test files are added later.
          #
          # screenshot_tour_test.dart is excluded: it only makes progress
          # paired with the scripts/capture_screenshots.ps1 watcher process
          # (see AGENTS.md "Recipe G"), which doesn't exist in CI — it would
          # just time out waiting for capture acks that never arrive.
          for f in integration_test/*_test.dart; do
            if [ "$(basename "$f")" = "screenshot_tour_test.dart" ]; then
              continue
            fi
            echo "::group::$f"
            xvfb-run -a flutter test "$f" -d linux -r github
            echo "::endgroup::"
          done
      - name: Stop auth fixture servers
        if: always()
        run: docker rm -f nats-fixture-userpass nats-fixture-token nats-fixture-nkey nats-fixture-creds
  release-notes:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract changelog section
        run: |
          PUBSPEC_VERSION="$(grep -m1 '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match pubspec.yaml version $PUBSPEC_VERSION" >&2
            exit 1
          fi
          if ! grep -q "^# $PUBSPEC_VERSION\$" CHANGELOG.md; then
            echo "CHANGELOG.md has no '# $PUBSPEC_VERSION' entry" >&2
            exit 1
          fi
          awk '/^# /{if (p) exit; if ($0 == "# '"$PUBSPEC_VERSION"'") p=1; next} p' CHANGELOG.md > release_notes.md
      - name: Set release description
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body_path: release_notes.md
  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install project dependencies
        run: flutter pub get
      - name: Build artifacts
        run: flutter build web --release
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-web.zip
          directory: build/web
      - name: Web Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/web/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-web.zip
  build-windows-x64:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable windows build
        run: flutter config --enable-windows-desktop
      - name: Build artifacts
        run: flutter build windows --release
      - name: Archive x64 Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-x64.zip
          directory: build/windows/x64/runner/Release
      - name: Upload x64 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: build/windows/x64/runner/Release/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-x64.zip
      - name: Windows x64 Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/windows/x64/runner/Release/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-x64.zip
  build-windows-arm64:
    needs: test
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v7
      - name: Setup Flutter
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '3.44.6'
          $root = Join-Path $env:RUNNER_TEMP 'flutter-root'
          $dest = Join-Path $root 'flutter'
          if (Test-Path $root) { Remove-Item $root -Recurse -Force }
          New-Item -ItemType Directory -Path $root -Force | Out-Null
          $zip = Join-Path $root 'flutter.zip'
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_${version}-stable.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $root -Force
          "$dest\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "FLUTTER_ROOT=$dest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable windows build
        run: flutter config --enable-windows-desktop
      - name: Build artifacts
        run: flutter build windows --release
      - name: Locate build output
        shell: pwsh
        run: |
          $candidates = @(
            'build/windows/arm64/runner/Release',
            'build/windows/x64/runner/Release',
            'build/windows/runner/Release'
          )
          $resolved = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $resolved) {
            throw 'No Windows build output directory found.'
          }
          "BUILD_DIR=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Archive arm64 Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-arm64.zip
          directory: ${{ env.BUILD_DIR }}
      - name: Windows arm64 Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.BUILD_DIR }}/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-arm64.zip
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable linux build
        run: flutter config --enable-linux-desktop
      - name: Build artifacts
        run: flutter build linux --release
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-linux.zip
          directory: build/linux/x64/release/bundle
      - name: Linux Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/linux/x64/release/bundle/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-linux.zip
  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable macOS build
        run: flutter config --enable-macos-desktop
      - name: Build artifacts
        run: flutter build macos --release
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-macos.zip
          directory: build/macos/Build/Products/Release
      - name: macOS Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/macos/Build/Products/Release/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-macos.zip
  build-docker:
    needs: test
    runs-on: ubuntu-latest
    env:
      IMG_NAME: nverbeek/nats-client-flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Debug
        run: |
          echo "github.ref -> {{ github.ref }}"
  
      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMG_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value={{sha}},enable=${{ github.ref_type != 'tag' }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        if: ${{ github.ref_type == 'tag' }}
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref_type == 'tag' && !startsWith(github.ref, 'refs/tags/v0.')}}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
