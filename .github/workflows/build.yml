on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
env:
  ARTIFACT_SUFFIX: ${{ github.run_id }}-${{ github.sha }}
jobs: 
  build-web: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install project dependencies
        run: flutter pub get
      - name: Build artifacts
        run: flutter build web --release
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-web.zip
          directory: build/web
      - name: Web Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/web/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-web.zip
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable windows build
        run: flutter config --enable-windows-desktop
      - name: Build artifacts
        run: flutter build windows --release
      - name: Archive x64 Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-x64.zip
          directory: build/windows/x64/runner/Release
      - name: Windows x64 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/windows/x64/runner/Release/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-x64.zip
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '3.44.5'
          $dest = Join-Path $env:RUNNER_TEMP 'flutter'
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          $zip = Join-Path $env:RUNNER_TEMP 'flutter.zip'
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_${version}-stable.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP -Force
          Move-Item -Path (Join-Path $env:RUNNER_TEMP 'flutter') -Destination $dest -Force
          "$dest\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "FLUTTER_ROOT=$dest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable windows build
        run: flutter config --enable-windows-desktop
      - name: Build artifacts
        run: flutter build windows --release
      - name: Locate build output
        shell: pwsh
        run: |
          $candidates = @(
            'build/windows/arm64/runner/Release',
            'build/windows/x64/runner/Release',
            'build/windows/runner/Release'
          )
          $resolved = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $resolved) {
            throw 'No Windows build output directory found.'
          }
          "BUILD_DIR=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Archive arm64 Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-arm64.zip
          directory: ${{ env.BUILD_DIR }}
      - name: Windows arm64 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.BUILD_DIR }}/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-windows-arm64.zip
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable linux build
        run: flutter config --enable-linux-desktop
      - name: Build artifacts
        run: flutter build linux --release
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-linux.zip
          directory: build/linux/x64/release/bundle
      - name: Linux Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/linux/x64/release/bundle/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-linux.zip
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install project dependencies
        run: flutter pub get
      - name: Enable macOS build
        run: flutter config --enable-macos-desktop
      - name: Build artifacts
        run: flutter build macos --release
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-macos.zip
          directory: build/macos/Build/Products/Release
      - name: macOS Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/macos/Build/Products/Release/NATSClientUI-${{ env.ARTIFACT_SUFFIX }}-macos.zip
  build-docker:
    runs-on: ubuntu-latest
    env:
      IMG_NAME: nverbeek/nats-client-flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "github.ref -> {{ github.ref }}"
  
      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMG_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value={{sha}},enable=${{ github.ref_type != 'tag' }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        if: ${{ github.ref_type == 'tag' }}
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref_type == 'tag' && !startsWith(github.ref, 'refs/tags/v0.')}}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
